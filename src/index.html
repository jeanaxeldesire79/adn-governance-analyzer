<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<title>ADN Governance Analyzer - Cote d Ivoire 2024</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500;600&amp;family=Noto+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&amp;display=swap" rel="stylesheet">
<style>
:root{--gold:#b8942e;--gold-lg:#d4a843;--gold-dim:rgba(184,148,46,0.12);--green:#2d9b6e;--green-lg:#3cb883;--green-dim:rgba(45,155,110,0.10);--red:#c94b4b;--red-lg:#e06060;--red-dim:rgba(201,75,75,0.10);--blue:#4a7fc1;--blue-lg:#6a9fd8;--blue-dim:rgba(74,127,193,0.10);--purple:#8b6fc4;--purple-dim:rgba(139,111,196,0.10);--bg:#080c14;--bg2:#0c1424;--card:rgba(255,255,255,0.012);--card-hover:rgba(255,255,255,0.022);--border:rgba(255,255,255,0.05);--text:rgba(255,255,255,0.48);--text-dim:rgba(255,255,255,0.18);--text-bright:rgba(255,255,255,0.72);--ease:cubic-bezier(0.4,0,0.2,1);--ease-spring:cubic-bezier(0.34,1.56,0.64,1);--ease-out:cubic-bezier(0,0,0.2,1);--radius-sm:4px;--radius-md:7px;--radius-lg:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);font-family:Inter,Noto Sans,sans-serif;color:var(--text);scroll-behavior:smooth;font-size:16px;-webkit-font-smoothing:antialiased}
body{min-height:100vh;overflow-x:hidden}
::selection{background:var(--gold-dim);color:var(--gold-lg)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
header{background:rgba(8,12,20,0.72);backdrop-filter:blur(28px)saturate(1.4);border-bottom:1px solid var(--border);padding:12px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px}
header h1{font-size:14px;font-weight:600;color:white;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px}
header h1 .logo-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);display:inline-block}
header h1 span{color:var(--gold);font-weight:700}
.header-meta{font-size:10px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
.header-meta .flag{font-size:13px}
.header-meta .badge{background:rgba(184,148,46,0.10);color:var(--gold-lg);padding:2px 8px;border-radius:10px;font-size:9px;font-weight:500;border:1px solid rgba(184,148,46,0.15)}
.container{max-width:1100px;margin:0 auto;padding:20px 40px;width:100%}
.section-title{font-size:11px;color:var(--text-bright);font-weight:600;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section-title::after{content:"";flex:1;height:1px;background:var(--border)}
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 12px 12px;text-align:center;transition:all 0.25s var(--ease);position:relative;overflow:hidden}
.stat-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;opacity:0.6;transition:opacity 0.25s var(--ease)}
.stat-card:hover::before{opacity:1}
.stat-card:hover{background:var(--card-hover);border-color:rgba(255,255,255,0.08);transform:translateY(-1px)}
.stat-card:nth-child(1)::before{background:var(--gold)}
.stat-card:nth-child(2)::before{background:var(--blue)}
.stat-card:nth-child(3)::before{background:var(--green)}
.stat-card:nth-child(4)::before{background:var(--red)}
.stat-card:nth-child(5)::before{background:var(--purple)}
.stat-card .num{font-family:JetBrains Mono,monospace;font-size:24px;font-weight:600;line-height:1.1}
.stat-card .lbl{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.6px;margin-top:4px;font-weight:500}
.stat-card:nth-child(1) .num{color:var(--gold)}
.stat-card:nth-child(2) .num{color:var(--blue)}
.stat-card:nth-child(3) .num{color:var(--green)}
.stat-card:nth-child(4) .num{color:var(--red)}
.stat-card:nth-child(5) .num{color:var(--purple)}
.sentiment-bar-wrapper{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:16px}
.sentiment-bar-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:4px}
.sentiment-bar-meta .sbl{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;font-weight:500}
.sentiment-bar-meta .sb-labels{display:flex;gap:12px;font-size:10px;flex-wrap:wrap}
.sentiment-bar-meta .sb-labels span{display:flex;align-items:center;gap:4px;white-space:nowrap}
.sentiment-bar-meta .sb-labels .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.sentiment-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:6px}
.sentiment-bar .seg{transition:width 0.45s var(--ease-out)}
.sentiment-bar .seg:first-child{border-radius:4px 0 0 4px}
.sentiment-bar .seg:last-child{border-radius:0 4px 4px 0}
.sent-bar-detail{display:flex;justify-content:space-between;font-size:9px;color:var(--text-dim)}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.chart-box h3{font-size:11px;color:var(--text-bright);font-weight:600;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.sentiment-chart-wrapper{display:flex;align-items:center;gap:20px;justify-content:center}
.sentiment-donut{width:100px;height:100px;flex-shrink:0}
.sentiment-legend{display:flex;flex-direction:column;gap:6px}
.sentiment-legend .leg-item{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-dim)}
.sentiment-legend .leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sentiment-legend .num{font-family:JetBrains Mono,monospace;font-size:13px;font-weight:600;color:var(--text-bright);margin-left:auto}
.sentiment-legend .pct{font-size:10px;color:var(--text-dim);font-weight:400}
.treemap{display:flex;gap:4px;margin-top:10px;min-height:80px;align-items:stretch}
.treemap .tile{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:var(--radius-sm);padding:8px 4px;font-size:10px;font-weight:600;color:rgba(255,255,255,0.85);text-align:center;transition:all 0.2s var(--ease);cursor:default;min-width:0;overflow:hidden}
.treemap .tile:hover{transform:scale(1.03);filter:brightness(1.2)}
.clusters{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.cluster-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 10px;text-align:center;cursor:pointer;transition:all 0.2s var(--ease-spring);position:relative;overflow:hidden}
.cluster-card::after{content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--gold);transition:width 0.25s var(--ease)}
.cluster-card:hover{background:var(--card-hover);border-color:rgba(184,148,46,0.12);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.cluster-card:hover::after{width:60%}
.cluster-card.active{background:rgba(184,148,46,0.04);border-color:var(--gold)}
.cluster-card.active::after{width:60%}
.cluster-card .c-icon{font-size:20px;display:block;margin-bottom:4px}
.cluster-card .c-num{font-family:JetBrains Mono,monospace;font-size:18px;color:var(--gold);font-weight:600;line-height:1.2}
.cluster-card .c-lbl{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.6px;margin-top:3px;font-weight:500}
.filters{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:end}
.filter-group{display:flex;flex-direction:column;gap:3px;flex:1;min-width:110px}
.filter-group label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.6px;font-weight:500}
.filters select,.filters input{padding:7px 10px;background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-bright);font-size:12px;font-family:inherit;outline:none;transition:all 0.2s var(--ease);-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2710%27 height=%276%27 viewBox=%270 0 10 6%27%3E%3Cpath fill=%27rgba(255,255,255,0.35)%27 d=%27M0 0l5 6 5-6z%27/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center;padding-right:28px;cursor:pointer}
.filters select:focus,.filters input:focus{border-color:var(--gold);background:rgba(184,148,46,0.03);box-shadow:0 0 0 2px rgba(184,148,46,0.06)}
.filters select:hover,.filters input:hover{border-color:rgba(255,255,255,0.12)}
.filters option{background:var(--bg2);color:var(--text-bright)}
.search-input{min-width:160px;background-image:none!important;padding-right:10px!important}
.btn{font-size:11px;font-weight:600;padding:7px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;transition:all 0.2s var(--ease);font-family:inherit;white-space:nowrap}
.btn-primary{background:var(--gold);color:var(--bg)}.btn-primary:hover{background:white;transform:translateY(-1px);box-shadow:0 4px 12px rgba(184,148,46,0.2)}
.btn-clear{background:transparent;color:var(--text-dim);border:1px solid var(--border)}.btn-clear:hover{border-color:var(--text);color:var(--text-bright);background:rgba(255,255,255,0.025)}
.btn-export{background:transparent;color:var(--text-dim);border:1px solid var(--border);display:flex;align-items:center;gap:4px;font-size:10px}.btn-export:hover{border-color:rgba(184,148,46,0.3);color:var(--gold-lg);background:var(--gold-dim)}
.btn-group{display:flex;gap:6px;align-items:end;flex-wrap:wrap}
.results-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.results-meta .count{font-size:11px;color:var(--text-dim);font-weight:500}
.results-meta .count strong{color:var(--text-bright)}
.statement-list{display:flex;flex-direction:column;gap:6px;min-height:60px}
.statement{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 16px;transition:all 0.2s var(--ease);animation:slideIn 0.3s var(--ease-out) both}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.statement:hover{background:var(--card-hover);border-color:rgba(184,148,46,0.06);transform:translateX(4px)}
.statement .top{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.statement .tag{font-size:8px;font-weight:700;letter-spacing:0.9px;text-transform:uppercase;padding:2px 7px;border-radius:var(--radius-sm);line-height:1.4}
.tag-decision{background:rgba(74,127,193,0.10);color:var(--blue-lg);border:1px solid rgba(74,127,193,0.15)}
.tag-issue{background:rgba(201,75,75,0.10);color:var(--red-lg);border:1px solid rgba(201,75,75,0.15)}
.tag-promise{background:rgba(45,155,110,0.10);color:var(--green-lg);border:1px solid rgba(45,155,110,0.15)}
.statement .sentiment-tag{font-size:7px;padding:1px 6px;border-radius:var(--radius-sm);text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
.sent-positive{background:var(--green-dim);color:var(--green-lg)}
.sent-negative{background:var(--red-dim);color:var(--red-lg)}
.sent-neutral{background:rgba(255,255,255,0.03);color:var(--text-dim)}
.statement .impact-tag{font-size:7px;color:var(--text-dim);padding:2px 6px;border-radius:var(--radius-sm);border:1px solid var(--border);font-weight:500;text-transform:uppercase}
.statement .action-tag{font-size:8px;color:var(--gold);font-weight:500;padding:2px 6px;border-radius:var(--radius-sm);background:rgba(184,148,46,0.04)}
.statement .sentence{font-size:13px;line-height:1.6;color:var(--text-bright);font-weight:300}
.statement .sentence .match-highlight{background:rgba(184,148,46,0.18);color:var(--gold-lg);border-radius:2px;padding:0 3px;font-weight:500;border-bottom:1px solid rgba(184,148,46,0.3)}
.statement .id-ref{font-size:8px;color:var(--text-dim);font-family:JetBrains Mono,monospace}
.empty-state,.error-state,.loading-state{text-align:center;padding:40px 20px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-top:10px}
.empty-state .icon{font-size:40px;margin-bottom:10px}
.empty-state .msg{font-size:13px;color:var(--text-dim)}
.empty-state .sub{font-size:10px;color:var(--text-dim);margin-top:4px}
.error-state .icon{font-size:32px;margin-bottom:8px}
.error-state .msg{font-size:13px;color:var(--red-lg)}
.error-state .sub{font-size:10px;color:var(--text-dim);margin-top:4px}
.error-state .btn-retry{margin-top:12px;padding:6px 18px;background:var(--red-dim);color:var(--red-lg);border:1px solid rgba(201,75,75,0.2);border-radius:var(--radius-sm);cursor:pointer;font-size:11px;font-weight:500;font-family:inherit;transition:all 0.2s var(--ease)}.error-state .btn-retry:hover{background:rgba(201,75,75,0.18)}
.loading-state .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state .msg{font-size:13px;color:var(--text-dim)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%)translateY(80px);background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 20px;color:var(--text-bright);font-size:12px;z-index:200;opacity:0;transition:all 0.35s var(--ease-spring);pointer-events:none;backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,0.5);display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateX(-50%)translateY(0)}
.toast .toast-icon{font-size:16px}
.copied{background:rgba(45,155,110,0.15)!important;border-color:var(--green)!important;color:var(--green-lg)!important}
@media(max-width:768px){
  .container{padding:12px 14px}
  header{padding:10px 14px}
  header h1{font-size:12px}
  .header-meta .badge{display:none}
  .stats-row{grid-template-columns:repeat(2,1fr);gap:6px}
  .stats-row .stat-card:nth-child(5){grid-column:span 2}
  .clusters{grid-template-columns:repeat(2,1fr)}
  .filters{padding:12px 14px;gap:8px}
  .filter-group{min-width:calc(50% - 8px);flex:initial}
  .filter-group:nth-child(5){min-width:100%}
  .btn-group{width:100%;justify-content:flex-end}
  .chart-row{grid-template-columns:1fr}
  .sentiment-chart-wrapper{flex-direction:column;gap:12px}
  .statement{padding:12px 14px}
  .statement .sentence{font-size:12px;line-height:1.55}
  .treemap{min-height:60px}
  .treemap .tile{font-size:8px;padding:4px 2px}
}
@media(max-width:480px){
  .stats-row .stat-card:nth-child(5){grid-column:span 2}
  .filter-group{min-width:100%}
  .results-meta{flex-direction:column;gap:6px;align-items:flex-start}
  .sentiment-chart-wrapper{flex-direction:row;gap:12px}
}
@media(min-width:769px)and(max-width:1024px){.chart-row{grid-template-columns:1fr}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}}
@media print{header{position:static;backdrop-filter:none}.filters,.btn-group{display:none}}
.beta-badge{position:absolute;top:12px;right:16px;display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#d4a84b,#c4952e);color:#1a1a2e;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;box-shadow:0 2px 6px rgba(0,0,0,.25);z-index:200;cursor:default;transition:transform .2s ease}.beta-badge:hover{transform:scale(1.08)}.beta-badge i{font-size:10px}.beta-badge .version{font-weight:400;opacity:.7;margin-left:2px}
</style>
</head>
<body>
<header>
  <h1><span class="logo-dot"></span> ADG <span>ADN Governance Analyzer</span></h1>
  <div class="header-meta"><span class="flag">CIV</span> Cote d Ivoire - Address to the Nation 2024 <span class="badge">v2.0</span></div>
  <div class="beta-badge" title="In Development"><i class="fas fa-flask"></i> BETA <span class="version">v2.0.1</span></div>
</header>
<div class="container">
  <div class="section-title">Overview</div>
  <div class="stats-row" id="statsRow"></div>
  <div class="sentiment-bar-wrapper">
    <div class="sentiment-bar-meta">
      <span class="sbl">Sentiment Distribution</span>
      <div class="sb-labels" id="sbLabels"></div>
    </div>
    <div class="sentiment-bar" id="sentimentBar"></div>
    <div class="sent-bar-detail" id="sentBarDetail"></div>
  </div>
  <div class="chart-row">
    <div class="chart-box">
      <h3>Sentiment Breakdown</h3>
      <div class="sentiment-chart-wrapper">
        <svg class="sentiment-donut" id="donutChart" viewBox="0 0 42 42">
          <circle cx="21" cy="21" r="15.9" fill="none" stroke="var(--border)" stroke-width="3.2"/>
        </svg>
        <div class="sentiment-legend" id="sentimentLegend"></div>
      </div>
    </div>
    <div class="chart-box">
      <h3>Topic Distribution</h3>
      <div class="treemap" id="treemap"></div>
    </div>
  </div>
  <div class="section-title">Thematic Clusters</div>
  <div class="clusters" id="clusters"></div>
  <div class="section-title">Filter and Search</div>
  <div class="filters">
    <div class="filter-group"><label for="filterTopic">Topic</label><select id="filterTopic"><option value="all">All Topics</option></select></div>
    <div class="filter-group"><label for="filterSentiment">Sentiment</label><select id="filterSentiment"><option value="all">All Sentiments</option><option value="Positive">Positive</option><option value="Negative">Negative</option><option value="Neutral">Neutral</option></select></div>
    <div class="filter-group"><label for="filterImpact">Impact</label><select id="filterImpact"><option value="all">All Levels</option><option value="Low">Low</option><option value="Medium">Medium</option><option value="High">High</option></select></div>
    <div class="filter-group"><label for="filterAction">Policy Domain</label><select id="filterAction"><option value="all">All Domains</option></select></div>
    <div class="filter-group"><label for="searchInput">Search</label><input type="text" class="search-input" id="searchInput" placeholder="Search in French..." autocomplete="off"></div>
    <div class="btn-group">
      <button class="btn btn-primary" id="applyBtn">Apply</button>
      <button class="btn btn-clear" id="clearBtn">Clear</button>
      <button class="btn btn-export" id="exportBtn">Copy</button>
    </div>
  </div>
  <div class="results-meta">
    <div class="count">Showing <strong id="resultCount">-</strong> of <strong id="totalCount">-</strong> statements</div>
  </div>
  <div id="listContainer">
    <div class="statement-list" id="statementList"></div>
  </div>
</div>
<div class="toast" id="toast"><span class="toast-icon"></span><span id="toastMsg">Copied to clipboard</span></div>
<script>
(function(){
'use strict';
function escapeHtml(str) {
  if (!str) return '';
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}
let state={statements:[],filtered:[],loading:true,error:null,activeCluster:null,topicCounts:{},sentimentCounts:{Positive:0,Negative:0,Neutral:0},impactCounts:{},actionCounts:{}};
let dom={};
dom.statsRow=document.getElementById('statsRow');
dom.sentimentBar=document.getElementById('sentimentBar');
dom.sbLabels=document.getElementById('sbLabels');
dom.sentBarDetail=document.getElementById('sentBarDetail');
dom.donutChart=document.getElementById('donutChart');
dom.sentimentLegend=document.getElementById('sentimentLegend');
dom.treemapEl=document.getElementById('treemap');
dom.clustersEl=document.getElementById('clusters');
dom.statementList=document.getElementById('statementList');
dom.resultCount=document.getElementById('resultCount');
dom.totalCount=document.getElementById('totalCount');
dom.listContainer=document.getElementById('listContainer');
dom.toast=document.getElementById('toast');
dom.toastMsg=document.getElementById('toastMsg');
dom.filterTopic=document.getElementById('filterTopic');
dom.filterSentiment=document.getElementById('filterSentiment');
dom.filterImpact=document.getElementById('filterImpact');
dom.filterAction=document.getElementById('filterAction');
dom.searchInput=document.getElementById('searchInput');

/* TOAST */
let toastTimer = null;
function showToast(msg, icon) {
  dom.toastMsg.textContent = msg || 'Done';
  dom.toast.querySelector('.toast-icon').textContent = icon || '\u2713';
  dom.toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ dom.toast.classList.remove('show'); }, 2200);
}

/* DATA LOADING */
function loadData() {
  state.loading = true;
  state.error = null;
  renderLoading();

  Promise.all([
    fetch('/api/data/adn/stats'),
    fetch('/api/data/adn/statements')
  ]).then(function(responses) {
    if (!responses[0].ok || !responses[1].ok) throw new Error('API '+responses[0].status+'/'+responses[1].status);
    return Promise.all([responses[0].json(), responses[1].json()]);
  }).then(function(results) {
    let data = results[1];
    if (!data.statements || !Array.isArray(data.statements)) throw new Error('Invalid API shape');
    state.statements = data.statements.map(function(s,i){
      return {
        id: s.id || (i+1),
        topic: s.topic,
        sentence: s.sentence,
        sentiment: s.sentiment,
        impact: s.impact,
        action: s.action,
        type: s.type || ''
      };
    });
    state.loading = false;
    computeStats();
    fullRender();
  }).catch(function(err) {
    console.warn('API fail:', err.message);
    state.error = 'Failed to load data: '+err.message;
    state.loading = false;
    renderError();
  });
}

/* COMPUTE */
function computeStats() {
  let s = state.statements;
  state.topicCounts = {};
  state.sentimentCounts = { Positive:0, Negative:0, Neutral:0 };
  state.impactCounts = {};
  state.actionCounts = {};
  s.forEach(function(st){
    state.topicCounts[st.topic] = (state.topicCounts[st.topic]||0) + 1;
    if (st.sentiment in state.sentimentCounts) state.sentimentCounts[st.sentiment]++;
    state.impactCounts[st.impact] = (state.impactCounts[st.impact]||0) + 1;
    state.actionCounts[st.action] = (state.actionCounts[st.action]||0) + 1;
  });
}

/* FULL RENDER */
function fullRender() {
  renderStats();
  renderSentimentBar();
  renderDonutChart();
  renderTreemap();
  renderClusters();
  populateFilterOptions();
  applyFilters();
}

function renderLoading() {
  dom.listContainer.innerHTML = '<div class="loading-state"><div class="spinner"></div><div class="msg">Analyzing the address...</div></div>';
}

function renderError() {
  dom.listContainer.innerHTML = '<div class="error-state"><div class="icon">!</div><div class="msg">'+escapeHtml(state.error)+'</div><div class="sub">Check your connection and try again.</div><button class="btn-retry" id="retryBtn">Retry</button></div>';
  document.getElementById('retryBtn').addEventListener('click', loadData);
}

function renderEmpty() {
  dom.listContainer.innerHTML = '<div class="empty-state"><div class="icon">-</div><div class="msg">No statements match your filters.</div><div class="sub">Try broadening your search criteria.</div></div>';
}

/* RENDER: Stats */
function renderStats() {
  let total = state.statements.length;
  let d = state.topicCounts['Decision']||0;
  let i = state.topicCounts['Issue']||0;
  let p = state.topicCounts['Promise']||0;
  let domains = Object.keys(state.actionCounts).length;
  dom.statsRow.innerHTML =
    '<div class="stat-card"><div class="num">'+total+'</div><div class="lbl">Statements</div></div>'+
    '<div class="stat-card"><div class="num">'+d+'</div><div class="lbl">Decisions</div></div>'+
    '<div class="stat-card"><div class="num">'+i+'</div><div class="lbl">Issues</div></div>'+
    '<div class="stat-card"><div class="num">'+p+'</div><div class="lbl">Promises</div></div>'+
    '<div class="stat-card"><div class="num">'+domains+'</div><div class="lbl">Policy Domains</div></div>';
}

/* RENDER: Sentiment Bar */
function renderSentimentBar() {
  let total = state.statements.length;
  if (!total) return;
  let pos = state.sentimentCounts['Positive']||0;
  let neg = state.sentimentCounts['Negative']||0;
  let neu = state.sentimentCounts['Neutral']||0;
  let posPct = (pos/total*100).toFixed(1);
  let negPct = (neg/total*100).toFixed(1);
  let neuPct = (neu/total*100).toFixed(1);

  dom.sentimentBar.innerHTML =
    '<div class="seg" style="width:'+posPct+'%;background:var(--green)"></div>'+
    '<div class="seg" style="width:'+negPct+'%;background:var(--red)"></div>'+
    '<div class="seg" style="width:'+neuPct+'%;background:var(--text-dim)"></div>';

  dom.sbLabels.innerHTML =
    '<span><span class="dot" style="background:var(--green)"></span> Positive '+posPct+'%</span>'+
    '<span><span class="dot" style="background:var(--red)"></span> Negative '+negPct+'%</span>'+
    '<span><span class="dot" style="background:var(--text-dim)"></span> Neutral '+neuPct+'%</span>';

  dom.sentBarDetail.textContent = pos+' positive / '+neg+' negative / '+neu+' neutral';
}

/* RENDER: Donut Chart */
function renderDonutChart() {
  let total = state.statements.length;
  if (!total) return;
  let pos = state.sentimentCounts['Positive']||0;
  let neg = state.sentimentCounts['Negative']||0;
  let neu = state.sentimentCounts['Neutral']||0;
  let circumference = 2 * Math.PI * 15.9;
  let posLen = (pos/total) * circumference;
  let negLen = (neg/total) * circumference;
  let neuLen = (neu/total) * circumference;
  let posOff = 0;
  let negOff = -(posLen);
  let neuOff = -(posLen + negLen);

  // Clear previous arcs - keep the background circle
  let svg = dom.donutChart;
  let bgCircle = svg.querySelector('circle');
  while (svg.children.length > 1) svg.removeChild(svg.lastChild);

  let colors = ['var(--green)', 'var(--red)', 'var(--text-dim)'];
  let lengths = [posLen, negLen, neuLen];
  let offsets = [posOff, negOff, neuOff];

  for (let i = 0; i < 3; i++) {
    if (lengths[i] < 0.5) continue;
    let ns = 'http://www.w3.org/2000/svg';
    let circle = document.createElementNS(ns, 'circle');
    circle.setAttribute('cx', '21');
    circle.setAttribute('cy', '21');
    circle.setAttribute('r', '15.9');
    circle.setAttribute('fill', 'none');
    circle.setAttribute('stroke', colors[i]);
    circle.setAttribute('stroke-width', '3.2');
    circle.setAttribute('stroke-dasharray', lengths[i]+' '+(circumference - lengths[i]));
    circle.setAttribute('stroke-dashoffset', offsets[i]);
    circle.setAttribute('transform', 'rotate(-90 21 21)');
    circle.style.transition = 'stroke-dasharray 0.5s var(--ease-out), stroke-dashoffset 0.5s var(--ease-out)';
    svg.insertBefore(circle, null);
  }

  // Legend
  dom.sentimentLegend.innerHTML = '';
  let items = [
    {label:'Positive', count:pos, color:'var(--green)'},
    {label:'Negative', count:neg, color:'var(--red)'},
    {label:'Neutral', count:neu, color:'var(--text-dim)'}
  ];
  items.forEach(function(item){
    let pct = ((item.count/total)*100).toFixed(1);
    let div = document.createElement('div');
    div.className = 'leg-item';
    div.innerHTML = '<span class="leg-dot" style="background:'+item.color+'"></span>'+escapeHtml(item.label)+'<span class="num">'+escapeHtml(String(item.count))+'<span class="pct"> ('+pct+'%)</span></span>';
    dom.sentimentLegend.appendChild(div);
  });
}

/* RENDER: Treemap */
function renderTreemap() {
  let topics = state.topicCounts;
  let total = state.statements.length;
  let colors = ['var(--blue)', 'var(--red)', 'var(--green)'];
  let labels = Object.keys(topics).sort();
  let html = '';
  labels.forEach(function(key, i){
    let pct = (topics[key]/total*100).toFixed(1);
    html += '<div class="tile" style="flex:'+topics[key]+';background:'+colors[i % colors.length]+'"><strong>'+escapeHtml(key)+'</strong><span>'+topics[key]+' ('+pct+'%)</span></div>';
  });
  dom.treemapEl.innerHTML = html;
}

/* RENDER: Clusters */
function renderClusters() {
  let clusters = [
    {key:'Decision', label:'Decisions', count:state.topicCounts['Decision']||0},
    {key:'Issue', label:'Issues', count:state.topicCounts['Issue']||0},
    {key:'Promise', label:'Promises', count:state.topicCounts['Promise']||0}
  ];
  // Policy domains cluster
  let domainCount = Object.values(state.actionCounts).reduce(function(a,b){return a+b;}, 0);
  clusters.push({key:null, label:'Policy Domains', count:domainCount});

  dom.clustersEl.innerHTML = '';
  clusters.forEach(function(c){
    let div = document.createElement('div');
    div.className = 'cluster-card' + (state.activeCluster === c.key ? ' active' : '');
    div.innerHTML = '<div class="c-num">'+c.count+'</div><div class="c-lbl">'+escapeHtml(c.label)+'</div>';
    div.addEventListener('click', function(){ filterByCluster(c.key); });
    dom.clustersEl.appendChild(div);
  });
}

function filterByCluster(key) {
  if (state.activeCluster === key) {
    state.activeCluster = null;
    dom.filterTopic.value = 'all';
  } else {
    state.activeCluster = key;
    dom.filterTopic.value = key || 'all';
  }
  applyFilters();
  // Update cluster highlighting
  let cards = dom.clustersEl.querySelectorAll('.cluster-card');
  cards.forEach(function(card, i){
    let keys = ['Decision','Issue','Promise',null];
    card.classList.toggle('active', keys[i] === state.activeCluster);
  });
}

/* POPULATE FILTERS */
function populateFilterOptions() {
  let topicSel = dom.filterTopic;
  // Keep "All Topics" option
  let allOpt = topicSel.options[0];
  topicSel.innerHTML = '';
  topicSel.appendChild(allOpt);
  Object.keys(state.topicCounts).sort().forEach(function(t){
    let o = document.createElement('option');
    o.value = t;
    o.textContent = t + ' (' + state.topicCounts[t] + ')';
    topicSel.appendChild(o);
  });

  let actionSel = dom.filterAction;
  allOpt = actionSel.options[0];
  actionSel.innerHTML = '';
  actionSel.appendChild(allOpt);
  Object.keys(state.actionCounts).sort().forEach(function(a){
    let o = document.createElement('option');
    o.value = a;
    o.textContent = a + ' (' + state.actionCounts[a] + ')';
    actionSel.appendChild(o);
  });
}

/* APPLY FILTERS */
function applyFilters() {
  let topic = dom.filterTopic.value;
  let sentiment = dom.filterSentiment.value;
  let impact = dom.filterImpact.value;
  let action = dom.filterAction.value;
  let searchVal = dom.searchInput.value;
  let search = searchVal.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

  state.filtered = state.statements.filter(function(s){
    if (topic !== 'all' && s.topic !== topic) return false;
    if (sentiment !== 'all' && s.sentiment !== sentiment) return false;
    if (impact !== 'all' && s.impact !== impact) return false;
    if (action !== 'all' && s.action !== action) return false;
    if (search) {
      let stxt = s.sentence.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      if (stxt.indexOf(search) === -1) return false;
    }
    return true;
  });

  renderStatements();
}

function clearFilters() {
  dom.filterTopic.value = 'all';
  dom.filterSentiment.value = 'all';
  dom.filterImpact.value = 'all';
  dom.filterAction.value = 'all';
  dom.searchInput.value = '';
  state.activeCluster = null;
  applyFilters();
  let cards = dom.clustersEl.querySelectorAll('.cluster-card');
  cards.forEach(function(c){ c.classList.remove('active'); });
}

/* RENDER: Statements */
function renderStatements() {
  let list = dom.statementList;
  let countEl = dom.resultCount;
  let totalEl = dom.totalCount;

  totalEl.textContent = state.statements.length;

  if (state.filtered.length === 0) {
    countEl.textContent = '0';
    renderEmpty();
    return;
  }

  countEl.textContent = state.filtered.length;

  // Sort: decisions, issues, promises
  let order = {'Decision':0, 'Issue':1, 'Promise':2};
  let sorted = state.filtered.slice().sort(function(a,b){
    return (order[a.topic]||9) - (order[b.topic]||9);
  });

  let searchVal = dom.searchInput.value;
  let search = searchVal ? searchVal.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '') : '';
  let searchRegex = search ? new RegExp('('+search.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')+')', 'gi') : null;

  let html = '';
  sorted.forEach(function(s, idx){
    let topicCls = s.topic === 'Decision' ? 'tag-decision' : s.topic === 'Issue' ? 'tag-issue' : 'tag-promise';
    let sentCls = s.sentiment === 'Positive' ? 'sent-positive' : s.sentiment === 'Negative' ? 'sent-negative' : 'sent-neutral';
    let sentMsg = s.sentiment === 'Positive' ? 'Pos' : s.sentiment === 'Negative' ? 'Neg' : 'Neu';
    let sentence = escapeHtml(s.sentence);

    if (searchRegex) {
      sentence = sentence.replace(searchRegex, '<span class="match-highlight">$1</span>');
    }

    html += '<div class="statement" style="animation-delay:'+(idx*0.03)+'s">'+
      '<div class="top">'+
        '<span class="tag '+topicCls+'">'+escapeHtml(s.topic)+'</span>'+
        '<span class="sentiment-tag '+sentCls+'">'+sentMsg+'</span>'+
        '<span class="impact-tag">'+escapeHtml(s.impact)+'</span>'+
        '<span class="action-tag">'+escapeHtml(s.action)+'</span>'+
      '</div>'+
      '<div class="sentence">'+sentence+'</div>'+
    '</div>';
  });

  list.innerHTML = html;
}

/* EXPORT */
function exportFiltered() {
  let text = 'ADN Governance Analyzer - Cote d Ivoire 2024\n';
  text += 'Filtered Statements ('+state.filtered.length+' of '+state.statements.length+')\n';
  text += '========================================\n\n';
  state.filtered.forEach(function(s){
    text += '['+s.topic+'] ['+s.sentiment+'] ['+s.impact+'] ['+s.action+']\n';
    text += s.sentence+'\n\n';
  });

  navigator.clipboard.writeText(text).then(function(){
    showToast('Copied '+state.filtered.length+' statements', '\u2713');
    let btn = document.getElementById('exportBtn');
    btn.classList.add('copied');
    setTimeout(function(){ btn.classList.remove('copied'); }, 1500);
  }).catch(function(){
    // Fallback
    let ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied '+state.filtered.length+' statements', '\u2713');
  });
}

/* EVENT BINDING */
document.getElementById('applyBtn').addEventListener('click', applyFilters);
document.getElementById('clearBtn').addEventListener('click', clearFilters);
document.getElementById('exportBtn').addEventListener('click', exportFiltered);
dom.searchInput.addEventListener('keydown', function(e){
  if (e.key === 'Enter') applyFilters();
});

/* INIT */
loadData();

})();
</script>
</body>
